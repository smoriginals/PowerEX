<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – PowerEx</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- Navbar -->
<nav class="px-nav navbar navbar-expand-lg">
  <div class="container">
    <a class="nav-brand" href="index.html">
      <img src="assets/px-icon.svg" class="brand-icon-img" alt="PowerEx" width="34" height="34">
      <span class="brand-text-wrap">
        <span class="brand-text">POWER<span class="brand-ex">EX</span></span>
        <span class="brand-tag">Multi Trading</span>
      </span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme">
        <i class="fa-solid fa-moon ico-moon"></i>
        <i class="fa-solid fa-sun  ico-sun"></i>
      </button>
      <a href="signup.html" class="btn btn-sm" style="background:linear-gradient(135deg,#D97706,#F59E0B);color:#fff;border-radius:20px;font-weight:700;padding:.42rem 1.2rem;">Sign Up</a>
    </div>
  </div>
</nav>

<!-- Main -->
<div class="d-flex align-items-center justify-content-center" style="min-height:calc(100vh - 68px);padding:.75rem 1rem;">
  <div class="auth-card fade-in">

    <!-- Header -->
    <div class="text-center mb-3">
      <h5 style="font-weight:800;color:var(--gray-900);font-size:1.1rem;margin-bottom:.2rem;">Welcome back 👋</h5>
      <p style="color:var(--gray-500);font-size:.82rem;margin:0;">Sign in to your PowerEx account</p>
    </div>

    <!-- Alert -->
    <div class="alert-auth" id="loginAlert"></div>

    <!-- GitHub -->
    <button class="btn-github" id="githubBtn" type="button">
      <i class="fa-brands fa-google" style="font-size:1.1rem;"></i>
      Continue with Google
    </button>

    <div class="auth-divider">or</div>

    <!-- Form -->
    <form id="loginForm" novalidate>
      <div class="mb-3">
        <label style="font-size:.84rem;font-weight:600;color:var(--gray-700);margin-bottom:.4rem;display:block;">Email address</label>
        <input type="email" id="loginEmail" class="auth-input form-control" placeholder="you@example.com" autocomplete="email"/>
        <div class="field-error">Enter a valid email address.</div>
      </div>

      <div class="mb-4">
        <div class="d-flex justify-content-between align-items-center mb-1">
          <label style="font-size:.84rem;font-weight:600;color:var(--gray-700);">Password</label>
          <a href="#" style="font-size:.78rem;color:var(--green);text-decoration:none;">Forgot password?</a>
        </div>
        <div class="pass-wrap">
          <input type="password" id="loginPass" class="auth-input form-control" placeholder="••••••••" autocomplete="current-password"/>
          <i class="fa-solid fa-eye-slash toggle-pass"></i>
        </div>
        <div class="field-error">Password is required.</div>
      </div>

      <button type="submit" class="btn-auth">
        <i class="fa-solid fa-right-to-bracket me-2"></i>Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:1.4rem;font-size:.85rem;color:var(--gray-500);">
      Don't have an account?
      <a href="signup.html" style="color:var(--green);font-weight:700;text-decoration:none;">Create one</a>
    </p>
  </div>
</div>

<!-- Footer -->
<footer class="px-footer">
  <div class="footer-copy">© 2026 <span>PowerEx</span> Multi Trading. All rights reserved.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  // Redirect if already logged in
  if (typeof redirectIfAuth === 'function') redirectIfAuth('dashboard.html');
</script>
</body>
</html>
