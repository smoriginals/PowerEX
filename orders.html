<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Orders – PowerEx</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<nav class="px-nav navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="nav-brand" href="index.html">
      <img src="assets/px-icon.svg" class="brand-icon-img" alt="PowerEx" width="34" height="34">
      <span class="brand-text-wrap">
        <span class="brand-text">POWER<span class="brand-ex">EX</span></span>
        <span class="brand-tag">Multi Trading</span>
      </span>
    </a>
    <div class="ms-auto d-flex align-items-center gap-2">
      <button class="theme-toggle" id="themeToggle"><i class="fa-solid fa-moon ico-moon"></i><i class="fa-solid fa-sun ico-sun"></i></button>
      <a href="dashboard.html" class="nav-link" style="color:rgba(255,255,255,.8);font-weight:600;"><i class="fa-solid fa-gauge me-1"></i>Dashboard</a>
      <a href="#" class="logout-btn nav-link" style="color:#FB923C;font-weight:600;"><i class="fa-solid fa-right-from-bracket me-1"></i>Logout</a>
    </div>
  </div>
</nav>

<div class="container py-5 fade-in">

  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="dashboard.html" style="color:var(--gray-500);text-decoration:none;font-size:.85rem;"><i class="fa-solid fa-arrow-left me-1"></i>Dashboard</a>
    <span style="color:var(--gray-300);">›</span>
    <span style="color:var(--gray-700);font-size:.85rem;font-weight:600;">My Orders</span>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h4 class="page-title">My <span class="accent">Orders</span></h4>
    <a href="track-order.html" class="btn-auth" style="width:auto;padding:.55rem 1.4rem;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;font-size:.88rem;">
      <i class="fa-solid fa-location-dot"></i>Track Order
    </a>
  </div>

  <!-- Filter tabs -->
  <div class="d-flex gap-2 flex-wrap mb-4" id="orderFilters">
    <button class="inc-tab active" data-filter="all">All</button>
    <button class="inc-tab" data-filter="active">Active</button>
    <button class="inc-tab" data-filter="completed">Completed</button>
    <button class="inc-tab" data-filter="pending">Pending</button>
  </div>

  <div id="ordersContent">
    <div class="px-spinner-wrap"><div class="px-spinner"></div><div class="px-spinner-txt">Loading orders…</div></div>
  </div>

</div>

<!-- Logout Modal -->
<div class="modal fade" id="logoutModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-md);">
      <div class="modal-header" style="border-color:var(--gray-300);"><h5 class="modal-title" style="color:var(--gray-900);">Confirm Logout</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
      <div class="modal-body" style="color:var(--gray-700);">Are you sure you want to sign out?</div>
      <div class="modal-footer" style="border-color:var(--gray-300);">
        <button data-bs-dismiss="modal" style="background:var(--gray-100);color:var(--gray-700);border:1px solid var(--gray-300);border-radius:20px;padding:.42rem 1.2rem;font-weight:600;cursor:pointer;">Cancel</button>
        <button id="logoutConfirm" style="background:linear-gradient(135deg,#F97316,#C2410C);color:#fff;border:none;border-radius:20px;padding:.42rem 1.2rem;font-weight:700;cursor:pointer;">Yes, Logout</button>
      </div>
    </div>
  </div>
</div>

<!-- Inc-tab style (reuse) -->
<style>
  .inc-tab { padding:.55rem 1.2rem;border-radius:20px;font-weight:700;font-size:.82rem;border:2px solid var(--gray-300);background:var(--white);color:var(--gray-700);cursor:pointer;transition:all .25s; }
  .inc-tab:hover { border-color:var(--green);color:var(--green); }
  .inc-tab.active { background:linear-gradient(135deg,#3730A3,#4F46E5);border-color:var(--green);color:#fff;box-shadow:0 4px 14px rgba(79,70,229,.32); }
</style>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
<script>
  requireAuth('login.html');

  // Simulated orders
  const MOCK_ORDERS = [
    { id: 'PX001', plan: 'Silver Package', amount: '$500', date: 'Mar 01, 2026', status: 'active',    returns: '+5%' },
    { id: 'PX002', plan: 'Gold Package',   amount: '$1,200', date: 'Feb 14, 2026', status: 'completed', returns: '+12%' },
    { id: 'PX003', plan: 'Platinum Plan',  amount: '$3,000', date: 'Jan 22, 2026', status: 'pending',   returns: '—' },
  ];

  function badgeHtml(s) {
    if (s === 'active')    return '<span class="badge-success">Active</span>';
    if (s === 'completed') return '<span class="badge-warn">Completed</span>';
    return '<span class="badge-danger">Pending</span>';
  }

  function renderOrders(filter = 'all') {
    const list = filter === 'all' ? MOCK_ORDERS : MOCK_ORDERS.filter(o => o.status === filter);
    const el = document.getElementById('ordersContent');
    if (!list.length) {
      el.innerHTML = `<div class="empty-state"><i class="fa-solid fa-box-open"></i><h5>No orders found</h5><p>No orders match the selected filter.</p></div>`;
      return;
    }
    el.innerHTML = `
      <div class="px-card" style="padding:0;overflow:hidden;">
        <table class="px-table">
          <thead>
            <tr>
              <th>Order ID</th><th>Plan</th><th>Amount</th><th>Date</th><th>Returns</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody>
            ${list.map(o => `
              <tr>
                <td style="font-weight:700;color:var(--green);">#${o.id}</td>
                <td>${o.plan}</td>
                <td style="font-weight:700;color:var(--gold);">${o.amount}</td>
                <td style="color:var(--gray-500);">${o.date}</td>
                <td style="font-weight:700;color:#34d399;">${o.returns}</td>
                <td>${badgeHtml(o.status)}</td>
                <td><a href="track-order.html?id=${o.id}" style="font-size:.8rem;color:var(--green);font-weight:600;text-decoration:none;">Track</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`;
  }

  // Simulate load delay
  setTimeout(() => renderOrders('all'), 800);

  document.getElementById('orderFilters').addEventListener('click', e => {
    const btn = e.target.closest('.inc-tab');
    if (!btn) return;
    document.querySelectorAll('#orderFilters .inc-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderOrders(btn.dataset.filter);
  });
</script>
</body>
</html>
